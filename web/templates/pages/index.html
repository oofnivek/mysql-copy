{{template "base" .}}

{{define "title"}}{{.Title}}{{end}}

{{define "content"}}
<div class="layout">

    <div class="panel panel-source">
        <div class="panel-header">Source</div>
        <div class="panel-body">
            <div class="form-group">
                <label for="source-conn">Connection</label>
                <select id="source-conn" name="source_conn" class="form-control"
                        hx-get="/api/source/databases"
                        hx-target="#source-db-wrap"
                        hx-swap="innerHTML"
                        hx-trigger="change"
                        hx-include="this">
                    <option value="">-- select connection --</option>
                    {{range .Connections}}
                    <option value="{{.Name}}">{{.Name}}</option>
                    {{end}}
                </select>
            </div>
            <div id="source-db-wrap"></div>
        </div>
    </div>

    <div class="panel panel-dest">
        <div class="panel-header">Destination</div>
        <div class="panel-body">
            <div class="form-group">
                <label for="dest-conn">Connection</label>
                <select id="dest-conn" name="dest_conn" class="form-control"
                        hx-get="/api/dest/databases"
                        hx-target="#dest-db-wrap"
                        hx-swap="innerHTML"
                        hx-trigger="change"
                        hx-include="this">
                    <option value="">-- select connection --</option>
                    {{range .Connections}}
                    <option value="{{.Name}}">{{.Name}}</option>
                    {{end}}
                </select>
            </div>
            <div id="dest-db-wrap"></div>
        </div>
    </div>

    <div class="panel panel-presets">
        <div class="panel-header panel-header--action">
            <span>Presets</span>
            <div class="btn-group">
                <button id="btn-add-preset"
                        class="btn btn-secondary btn-sm"
                        disabled
                        hx-post="/api/presets"
                        hx-target="#presets-body"
                        hx-swap="innerHTML"
                        hx-include="[name='source_conn'],[name='source_db'],[name='source_table'],[name='dest_conn'],[name='dest_db']">
                    Add Preset
                </button>
                <button id="btn-start-copy"
                        class="btn btn-primary btn-sm"
                        disabled
                        hx-post="/api/copy"
                        hx-target="#progress-log"
                        hx-swap="innerHTML"
                        hx-include=".preset-check">
                    Start Copy
                </button>
            </div>
        </div>
        <div class="panel-body" id="presets-body">
            {{template "presets-list" .Presets}}
        </div>
    </div>

    <div class="panel panel-progress">
        <div class="panel-header">Progress</div>
        <div class="panel-body" id="progress-log">
            <p class="empty-state">Select presets and click Start Copy.</p>
        </div>
    </div>

</div>
{{end}}
