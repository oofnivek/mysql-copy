{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}{{.Title}}{{end}}</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="https://unpkg.com/htmx.org@2.0.3" integrity="sha384-0895/pl2MU10Hqc6jd4RvrthNlDiE9U1tWmX7WRESftEDRosgxNsQG/Ze9YMRzHq" crossorigin="anonymous"></script>
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">
            <a href="/" hx-boost="true">mysql-copy</a>
        </div>
        <ul class="nav-links">
            <li><a href="/" hx-boost="true">Home</a></li>
            <li class="nav-dropdown">
                <button class="nav-btn nav-dropdown-toggle" onclick="toggleDropdown('dropdown-connection')">
                    Connection <span class="dropdown-arrow">&#9662;</span>
                </button>
                <ul id="dropdown-connection" class="dropdown-menu" hidden>
                    <li>
                        <button class="dropdown-item" onclick="closeAllDropdowns(); openModal('modal-connection')">
                            Create
                        </button>
                    </li>
                    <li>
                        <button class="dropdown-item"
                                hx-get="/api/connections"
                                hx-target="#saved-connections-list"
                                hx-swap="innerHTML"
                                hx-on::after-request="closeAllDropdowns(); openModal('modal-saved')">
                            Saved
                        </button>
                    </li>
                </ul>
            </li>
        </ul>
    </nav>

    <main id="main-content" class="main">
        {{block "content" .}}{{end}}
    </main>

    <!-- Saved Connections Modal -->
    <div id="modal-saved" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-saved-title" hidden>
        <div class="modal-backdrop" onclick="closeModal('modal-saved')"></div>
        <div class="modal-dialog modal-dialog--lg">
            <div class="modal-header">
                <h2 id="modal-saved-title">Saved Connections</h2>
                <button class="modal-close" onclick="closeModal('modal-saved')" aria-label="Close">&times;</button>
            </div>
            <div class="modal-body">
                <div id="saved-connections-list"></div>
            </div>
        </div>
    </div>

    <!-- Create Connection Modal -->
    <div id="modal-connection" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-connection-title" hidden>
        <div class="modal-backdrop" onclick="closeModal('modal-connection')"></div>
        <div class="modal-dialog">
            <div class="modal-header">
                <h2 id="modal-connection-title">Create Connection</h2>
                <button class="modal-close" onclick="closeModal('modal-connection')" aria-label="Close">&times;</button>
            </div>
            <form hx-post="/api/connections"
                  hx-target="#connection-feedback"
                  hx-swap="innerHTML"
                  hx-on::after-request="onConnectionResponse(event)">
                <div class="modal-body">
                    <div id="connection-feedback"></div>
                    <div class="form-group">
                        <label for="conn-name">Connection Name</label>
                        <input id="conn-name" name="name" type="text" class="form-control" placeholder="My Server" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="conn-host">Host</label>
                            <input id="conn-host" name="host" type="text" class="form-control" placeholder="127.0.0.1" required>
                        </div>
                        <div class="form-group form-group--sm">
                            <label for="conn-port">Port</label>
                            <input id="conn-port" name="port" type="number" class="form-control" value="3306" min="1" max="65535" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="conn-user">Username</label>
                        <input id="conn-user" name="username" type="text" class="form-control" placeholder="root" required>
                    </div>
                    <div class="form-group">
                        <label for="conn-pass">Password</label>
                        <input id="conn-pass" name="password" type="password" class="form-control" placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <label for="conn-db">Database <span class="label-hint">(optional)</span></label>
                        <input id="conn-db" name="database" type="text" class="form-control" placeholder="my_database">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('modal-connection')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Connect</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
{{end}}
